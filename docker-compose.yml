version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: matcha-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: rootpassword
      TZ: Asia/Ho_Chi_Minh
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 5
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: matcha-backend
    ports:
      - "3000:3000"
    volumes:
      - ./shared_uploads:/app/uploads
      - ./frontend:/app/frontend
      - ./model3d:/app/model3d
    env_file:
      - .env
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - TZ=Asia/Ho_Chi_Minh
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  discord-bot:
    build: ./discord-bot
    container_name: matcha-bot
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - TZ=Asia/Ho_Chi_Minh
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b}
      - AI_PROVIDER=ollama
    env_file:
      - .env
    volumes:
      - ./shared_uploads:/app/uploads
      - ./discord-bot:/app
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: matcha-ollama
    volumes:
      - ./ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - OLLAMA_HOST=0.0.0.0:11434

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: matcha-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --logfile /app/uploads/cloudflared.log --url http://matcha-backend:3000
    volumes:
      - ./shared_uploads:/app/uploads
    depends_on:
      - backend
