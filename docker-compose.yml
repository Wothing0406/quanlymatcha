version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: matcha-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: rootpassword
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ./mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: matcha-backend
    ports:
      - "3000:3000"
    volumes:
      - ./shared_uploads:/app/uploads
      - ./frontend:/app/frontend
    env_file:
      - .env
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - TZ=Asia/Ho_Chi_Minh
    depends_on:
      - mysql
    restart: unless-stopped

  discord-bot:
    build: ./discord-bot
    container_name: matcha-bot
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - TZ=Asia/Ho_Chi_Minh
    env_file:
      - .env
    volumes:
      - ./shared_uploads:/app/uploads
    depends_on:
      - mysql
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: matcha-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://matcha-backend:3000
    depends_on:
      - backend
