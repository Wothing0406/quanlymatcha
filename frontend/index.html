<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matcha Portal - Đăng nhập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass {
            background: rgba(17, 24, 39, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .pin-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--matcha-main);
            transition: all 0.2s ease;
        }
        .pin-dot.filled {
            background: var(--matcha-main);
            transform: scale(1.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 overflow-hidden">
    <!-- Abstract Background Blobs -->
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-[var(--matcha-main)] opacity-10 blur-[120px] rounded-full animate-pulse"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-[var(--matcha-main)] opacity-10 blur-[120px] rounded-full animate-pulse" style="animation-delay: 1s"></div>

    <div class="glass-card w-full max-w-md p-10 rounded-[2.5rem] shadow-2xl relative z-10 transition-all animate-in fade-in zoom-in duration-700">
        <div class="space-y-4">
            <div class="w-20 h-20 bg-[var(--matcha-main)] rounded-3xl mx-auto flex items-center justify-center text-white text-3xl shadow-xl shadow-[var(--matcha-main-glow)]">
                <i class="fas fa-leaf"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tight dark:text-white">Matcha Portal</h1>
            <p class="text-sm text-gray-400 font-medium">Nhập mã PIN để truy cập trợ lý của bạn.</p>
        </div>

        <!-- Password Input Box -->
        <form id="login-form" autocomplete="off" class="space-y-6" onsubmit="submitPin(event)">
            <div class="relative">
                <input type="password" id="password-input" 
                    class="w-full bg-[var(--matcha-bg-alt)] dark:bg-gray-800/50 border border-[var(--matcha-border)] rounded-2xl px-6 py-4 text-center text-xl font-bold tracking-widest text-[var(--matcha-text)] dark:text-white focus:outline-none focus:ring-4 focus:ring-[var(--matcha-main)]/30 transition-all placeholder-gray-400"
                    placeholder="Nhập mật khẩu..." required>
                <div class="absolute inset-y-0 right-4 flex items-center">
                    <button type="button" onclick="togglePassword()" class="text-gray-400 hover:text-[var(--matcha-main)] transition-colors">
                        <i id="eye-icon" class="fas fa-eye-slash"></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" 
                class="w-full bg-[var(--matcha-main)] hover:brightness-110 text-white rounded-2xl py-4 font-black uppercase tracking-widest shadow-xl shadow-[var(--matcha-main-glow)] hover:scale-[1.02] active:scale-95 transition-all">
                Mở Khoá <i class="fas fa-unlock ml-2"></i>
            </button>
        </form>

        <p id="error-msg" class="text-xs text-red-500 font-bold italic h-4 opacity-0 transition-opacity"></p>

        <div class="pt-6 border-t border-gray-100 dark:border-gray-700">
            <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest">Matcha System Safeguard</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script>
        initDarkMode();
        const errorEl = document.getElementById('error-msg');
        const passInput = document.getElementById('password-input');

        function togglePassword() {
            const icon = document.getElementById('eye-icon');
            if (passInput.type === "password") {
                passInput.type = "text";
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                passInput.type = "password";
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        }

        async function submitPin(e) {
            e.preventDefault();
            const currentPin = passInput.value.trim();
            if (!currentPin) return;
            
            try {
                const res = await fetch(`${API_BASE}/auth/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin: currentPin })
                });
                
                if (res.ok) {
                    localStorage.setItem('matcha_pin', currentPin);
                    window.location.href = 'dashboard.html';
                } else {
                    passInput.value = "";
                    errorEl.textContent = "Mật khẩu không chính xác. Thử lại!";
                    errorEl.style.opacity = "1";
                    setTimeout(() => errorEl.style.opacity = "0", 3000);
                }
            } catch (err) {
                errorEl.textContent = "Lỗi kết nối Server.";
                errorEl.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
