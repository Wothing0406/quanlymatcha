<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matcha Portal - Đăng nhập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass {
            background: rgba(17, 24, 39, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .pin-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #3b82f6;
            transition: all 0.2s ease;
        }
        .pin-dot.filled {
            background: #3b82f6;
            transform: scale(1.2);
        }
    </style>
</head>
<body class="bg-[#f8fafc] dark:bg-gray-900 min-h-screen flex items-center justify-center p-6 overflow-hidden">
    <!-- Abstract Background Blobs -->
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-400/20 blur-[120px] rounded-full animate-pulse"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-400/20 blur-[120px] rounded-full animate-pulse" style="animation-delay: 1s"></div>

    <div class="w-full max-w-sm glass rounded-[3rem] p-10 shadow-2xl relative z-10 text-center space-y-8 animate-in fade-in zoom-in duration-700">
        <div class="space-y-4">
            <div class="w-20 h-20 bg-blue-500 rounded-3xl mx-auto flex items-center justify-center text-white text-3xl shadow-xl shadow-blue-500/30">
                <i class="fas fa-leaf"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tight dark:text-white">Matcha Portal</h1>
            <p class="text-sm text-gray-400 font-medium">Nhập mã PIN để truy cập trợ lý của bạn.</p>
        </div>

        <!-- PIN Dots Display -->
        <div class="flex justify-center gap-4 mb-8" id="pin-dots">
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
        </div>

        <!-- Numbers Grid -->
        <div class="grid grid-cols-3 gap-4">
            <button onclick="pressKey('1')" class="h-16 rounded-2xl bg-white dark:bg-gray-800 dark:text-white font-bold text-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-all active:scale-90">1</button>
            <button onclick="pressKey('2')" class="h-16 rounded-2xl bg-white dark:bg-gray-800 dark:text-white font-bold text-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-all active:scale-90">2</button>
            <button onclick="pressKey('3')" class="h-16 rounded-2xl bg-white dark:bg-gray-800 dark:text-white font-bold text-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-all active:scale-90">3</button>
            <button onclick="pressKey('4')" class="h-16 rounded-2xl bg-white dark:bg-gray-800 dark:text-white font-bold text-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-all active:scale-90">4</button>
            <button onclick="pressKey('5')" class="h-16 rounded-2xl bg-white dark:bg-gray-800 dark:text-white font-bold text-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-all active:scale-90">5</button>
            <button onclick="pressKey('6')" class="h-16 rounded-2xl bg-white dark:bg-gray-800 dark:text-white font-bold text-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-all active:scale-90">6</button>
            <button onclick="pressKey('7')" class="h-16 rounded-2xl bg-white dark:bg-gray-800 dark:text-white font-bold text-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-all active:scale-90">7</button>
            <button onclick="pressKey('8')" class="h-16 rounded-2xl bg-white dark:bg-gray-800 dark:text-white font-bold text-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-all active:scale-90">8</button>
            <button onclick="pressKey('9')" class="h-16 rounded-2xl bg-white dark:bg-gray-800 dark:text-white font-bold text-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-all active:scale-90">9</button>
            <button onclick="clearKey()" class="h-16 rounded-2xl bg-red-50 text-red-500 font-bold text-xl hover:bg-red-100 transition-all active:scale-90"><i class="fas fa-backspace"></i></button>
            <button onclick="pressKey('0')" class="h-16 rounded-2xl bg-white dark:bg-gray-800 dark:text-white font-bold text-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-all active:scale-90">0</button>
            <button onclick="submitPin()" class="h-16 rounded-2xl bg-blue-500 text-white font-bold text-xl hover:bg-blue-600 transition-all active:scale-90"><i class="fas fa-arrow-right"></i></button>
        </div>

        <p id="error-msg" class="text-xs text-red-500 font-bold italic h-4 opacity-0 transition-opacity"></p>

        <div class="pt-6 border-t border-gray-100 dark:border-gray-700">
            <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest">Matcha System Safeguard</p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        initDarkMode();
        let currentPin = "";
        const dots = document.querySelectorAll('.pin-dot');
        const errorEl = document.getElementById('error-msg');

        function updateDots() {
            dots.forEach((dot, idx) => {
                if (idx < currentPin.length) dot.classList.add('filled');
                else dot.classList.remove('filled');
            });
        }

        function pressKey(num) {
            if (currentPin.length < 4) {
                currentPin += num;
                updateDots();
                errorEl.style.opacity = "0";
                if (currentPin.length === 4) {
                    setTimeout(submitPin, 300);
                }
            }
        }

        function clearKey() {
            currentPin = currentPin.slice(0, -1);
            updateDots();
        }

        async function submitPin() {
            if (currentPin.length < 4) return;
            
            try {
                const res = await fetch(`${API_BASE}/auth/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin: currentPin })
                });
                
                if (res.ok) {
                    localStorage.setItem('matcha_pin', currentPin);
                    window.location.href = 'dashboard.html';
                } else {
                    currentPin = "";
                    updateDots();
                    errorEl.textContent = "Mã PIN không chính xác. Thử lại!";
                    errorEl.style.opacity = "1";
                }
            } catch (err) {
                errorEl.textContent = "Lỗi kết nối Server.";
                errorEl.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
